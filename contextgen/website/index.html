<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VP Phones</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      color: #1d1d1f;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 15px;
      background: rgba(255,255,255,0.9);
      position: sticky;
      top: 0;
      border-bottom: 1px solid #eee;
    }

    .navbar a {
      text-decoration: none;
      color: #000;
      font-size: 14px;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 80px 20px;
      background: #f5f5f7;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 20px;
      color: #555;
    }

    .hero button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      background: black;
      color: white;
      border-radius: 25px;
      cursor: pointer;
    }

    /* PRODUCTS */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 50px;
    }

    .card {
      text-align: center;
      padding: 20px;
      border-radius: 20px;
      background: #fafafa;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card h2 {
      margin: 15px 0 5px;
    }

    .card p {
      color: #666;
    }

    .card button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      background: black;
      color: white;
      border-radius: 20px;
      cursor: pointer;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 30px;
      background: #f5f5f7;
      font-size: 14px;
      color: #777;
    }

  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <a href="#">VP Phones</a>
    <a href="#">Store</a>
    <a href="#">Phones</a>
    <a href="#">Accessories</a>
    <a href="#">Support</a>
  </div>

  <!-- HERO -->
  <section class="hero">
    <h1>VP Ultra X</h1>
    <p>Power. Performance. Perfected.</p>
    <button>Shop Now</button>
  </section>

  <!-- PRODUCTS -->
  <section class="products">
    
    <div class="card">
      <img src="https://via.placeholder.com/300" alt="">
      <h2>VP Ultra X</h2>
      <p>Flagship performance with AI camera.</p>
      <button>Buy</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" alt="">
      <h2>VP Air Lite</h2>
      <p>Lightweight. Fast. Affordable.</p>
      <button>Buy</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" alt="">
      <h2>VP Pro Max</h2>
      <p>Big screen. Big power.</p>
      <button>Buy</button>
    </div>

  </section>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 VP Phones. Inspired by clean design.
  </div>

</body>
</html>
